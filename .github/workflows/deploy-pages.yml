# boardgameworld-web 폴더에서 빌드 후 gh-pages 브랜치로 배포합니다.
# 저장소 Settings → Pages → Source: Deploy from branch → gh-pages / (root)

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        working-directory: boardgameworld-web
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: boardgameworld-web/dist
          branch: gh-pages
          clean: true
